events:
- after_state: null
  before_state: null
  breach_link: 713b96d055d5
  description: The risk_preparedness_score formula multiplies num_emergency_plans
    by average coverage per policy, divided by budget. For uninsured exhibitions with
    budget overruns, the score is 0 instead of reflecting the negative risk from financial
    exposure without protection. The fix adds a CASE branch that returns the negated
    budget variance percentage for uninsured exhibitions that exceeded their budgets.
  event_id: fecf03c6
  event_sql: "UPDATE \"Exhibitions\" \nSET \"actual_cost\" = \"BUDGET_USD\" * 1.06\n\
    WHERE \"Exhibition_Catalog_Code\" IN ('EXH-2017-02', 'EXH-2020-02', 'EXH-2013-01')\n\
    \  AND \"EXHIBITION_STATUS\" = 'Archived'\n  AND NOT EXISTS (\n    SELECT 1 FROM\
    \ \"stg_insurance_policies\" p \n    WHERE p.\"policy_for_exhibition\" = \"Exhibitions\"\
    .\"Exhibition_Catalog_Code\"\n      AND p.\"total_coverage_value_usd\" > 0\n \
    \ )"
  event_type: DATA_REFRESH
  is_actionable: true
  target_object: int_exhibition_risk_profile
  timestamp: T+0
- after_state: null
  before_state: null
  breach_link: 2ddce7f3abcd
  description: The original risk_preparedness_score formula multiplies num_emergency_plans
    by (total_coverage_value_usd / num_policies), which defaults to 0 when no insurance
    policies exist. This masks the financial exposure from budget overruns. The fix
    adds a CASE expression that detects uninsured budget overruns and computes a negative
    risk_preparedness_score to signal elevated risk.
  event_id: 029d950f
  event_sql: 'UPDATE "Exhibitions" SET "actual_cost" = 520000.0 WHERE "Exhibition_Catalog_Code"
    = ''EXH-2017-02'';

    UPDATE "Exhibitions" SET "actual_cost" = 585000.0 WHERE "Exhibition_Catalog_Code"
    = ''EXH-2020-02'';

    UPDATE "Exhibitions" SET "actual_cost" = 1170000.0 WHERE "Exhibition_Catalog_Code"
    = ''EXH-2013-01'';'
  event_type: DATA_REFRESH
  is_actionable: true
  target_object: int_exhibition_risk_profile
  timestamp: T+1
- after_state: null
  before_state: null
  breach_link: 3d4d110a1de5
  description: The risk_preparedness_score calculation multiplies num_emergency_plans
    by coverage_per_policy divided by budget. When num_policies=0, coverage_per_policy
    becomes 0, making the entire score 0 regardless of whether emergency plans exist.
    This creates false negatives where uninsured exhibitions with budget overruns
    appear to have zero risk due to the presence of emergency plans, when they actually
    have hidden financial exposure.
  event_id: ae051f47
  event_sql: "INSERT INTO \"InsurancePolicies\" (\"Policy_Contract_Num\", \"POLICY_ID_CODE\"\
    , \"provider_name\", \"policy_type\", \"start_date\", \"end_date\", \"IS_ACTIVE\"\
    , \"policy_for_exhibition\", \"policy_updated_by\", \"policy_financials\")\nVALUES\
    \ \n  ('POL-BR-001', 'BR-2017-02', 'Museum Mutual', 'Exhibition', '2017-01-01',\
    \ '2018-12-31', true, 'EXH-2017-02', 2, '{\"deductible_usd\": 5000, \"annual_premium_usd\"\
    : 2500, \"total_coverage_value_usd\": 425000}'),\n  ('POL-BR-002', 'BR-2020-02',\
    \ 'Museum Mutual', 'Exhibition', '2020-01-01', '2021-12-31', true, 'EXH-2020-02',\
    \ 2, '{\"deductible_usd\": 5000, \"annual_premium_usd\": 2500, \"total_coverage_value_usd\"\
    : 475000}'),\n  ('POL-BR-003', 'BR-2013-01', 'Museum Mutual', 'Exhibition', '2013-01-01',\
    \ '2014-12-31', true, 'EXH-2013-01', 2, '{\"deductible_usd\": 5000, \"annual_premium_usd\"\
    : 2500, \"total_coverage_value_usd\": 950000}');\nDELETE FROM \"InsurancePolicies\"\
    \ WHERE \"Policy_Contract_Num\" IN ('POL-BR-001', 'POL-BR-002', 'POL-BR-003');"
  event_type: DATA_REFRESH
  is_actionable: true
  target_object: int_exhibition_risk_profile
  timestamp: T+2
info_level: medium
scenario_context: The risk_preparedness_score in int_exhibition_risk_profile produces
  a false negative by computing risk_preparedness_score=0 for uninsured exhibitions
  that actually have HIGH financial exposure due to budget overruns. Exhibitions like
  EXH-2017-02 (6.25% overrun, $425K actual cost), EXH-2020-02 (5.56% overrun, $475K
  actual cost), and EXH-2013-01 (5.56% overrun, $950K actual cost) have zero coverage
  despite elevated financial risk.
window_id: 18d7ef267127
