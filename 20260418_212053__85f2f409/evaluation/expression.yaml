      \ NULL\n  GROUP BY \"policy_for_exhibition\"\n),\nplan_agg AS (\n  SELECT\n\
      \    \"plan_for_hall\",\n    COUNT(*)::INTEGER AS num_emergency_plans\n  FROM\
      \ \"stg_emergency_plans\"\n  GROUP BY \"plan_for_hall\"\n)\nSELECT\n  e.\"Exhibition_Catalog_Code\"\
      ,\n  e.\"location_in_hall\",\n  COALESCE(p.total_coverage_value_usd, 0::NUMERIC)\
      \ AS total_coverage_value_usd,\n  COALESCE(p.num_policies, 0::INTEGER) AS num_policies,\n\
      \  COALESCE(pl.num_emergency_plans, 0::INTEGER) AS num_emergency_plans,\n  ROUND(\n\
      \    ((e.\"actual_cost\"::NUMERIC - e.\"BUDGET_USD\"::NUMERIC) / e.\"BUDGET_USD\"\
      ::NUMERIC * 100),\n    2\n  ) AS budget_variance_pct,\n  CASE\n    WHEN COALESCE(p.num_policies,\
      \ 0) = 0 AND e.\"actual_cost\" > e.\"BUDGET_USD\" THEN\n      ROUND(\n     \
      \   ((e.\"BUDGET_USD\"::NUMERIC - e.\"actual_cost\"::NUMERIC) / e.\"BUDGET_USD\"\
      ::NUMERIC * 100) *\n        LEAST(COALESCE(pl.num_emergency_plans, 0), 3) /\
      \ 10,\n        2\n      )\n    WHEN COALESCE(p.total_coverage_value_usd, 0)\
      \ = 0 AND COALESCE(p.num_policies, 0) > 0 AND e.\"actual_cost\" > e.\"BUDGET_USD\"\
      \ THEN\n      ROUND(\n        ((e.\"BUDGET_USD\"::NUMERIC - e.\"actual_cost\"\
      ::NUMERIC) / e.\"BUDGET_USD\"::NUMERIC * 100) *\n        LEAST(COALESCE(pl.num_emergency_plans,\
      \ 0), 3) / 10,\n        2\n      )\n    ELSE\n      ROUND(\n        COALESCE(pl.num_emergency_plans,\
      \ 0)::NUMERIC *\n        COALESCE(p.total_coverage_value_usd / NULLIF(p.num_policies::NUMERIC,\
      \ 0), 0::NUMERIC) /\n        e.\"BUDGET_USD\"::NUMERIC,\n        2\n      )\n\
      \  END AS risk_preparedness_score\nFROM \"stg_exhibitions\" e\nLEFT JOIN policy_agg\
      \ p ON p.\"policy_for_exhibition\" = e.\"Exhibition_Catalog_Code\"\nLEFT JOIN\
      \ plan_agg pl ON pl.\"plan_for_hall\" = e.\"location_in_hall\""
