    event_log:
      after_state: null
      before_state: null
      description: 'Exhibition curators across multiple halls have been managing tight
        budgets that occasionally slip into overrun territory. The financial teams
        noticed that several exhibitions with budget overruns had zero insurance coverage,
        yet the risk_preparedness_score showed 0 for all of them. This created a dangerous
        illusion: a score of 0 implied "no risk" when in fact these exhibitions had
        the highest financial exposure. When the risk management dashboard was reviewed
        by the board, these exhibitions appeared adequately prepared simply because
        they had emergency plans in place, while their uninsured status went unnoticed.'
      event_id: fd59d43a3917
      event_type: DISTRIBUTION_SHIFT
      target_object: int_exhibition_risk_profile
      timestamp: '2026-04-18T21:45:35.149879Z'
    event_log_info_level: medium
    event_sql: "UPDATE \"Exhibitions\" \nSET \"actual_cost\" = \"BUDGET_USD\" * 1.06\n\
      WHERE \"Exhibition_Catalog_Code\" IN ('EXH-2017-02', 'EXH-2020-02', 'EXH-2013-01')\n\
      \  AND \"EXHIBITION_STATUS\" = 'Archived'\n  AND NOT EXISTS (\n    SELECT 1\
      \ FROM \"stg_insurance_policies\" p \n    WHERE p.\"policy_for_exhibition\"\
      \ = \"Exhibitions\".\"Exhibition_Catalog_Code\"\n      AND p.\"total_coverage_value_usd\"\
      \ > 0\n  )"
    reference_is_original: false
    reference_model_sql: "CREATE OR REPLACE VIEW \"int_exhibition_risk_profile\" AS\n\
      WITH policy_agg AS (\n  SELECT\n    \"policy_for_exhibition\",\n    COUNT(*)::INTEGER\
      \ AS num_policies,\n    SUM(\"total_coverage_value_usd\") AS total_coverage_value_usd\n\
      \  FROM \"stg_insurance_policies\"\n  WHERE \"policy_for_exhibition\" IS NOT\
      \ NULL\n  GROUP BY \"policy_for_exhibition\"\n),\nplan_agg AS (\n  SELECT\n\
      \    \"plan_for_hall\",\n    COUNT(*)::INTEGER AS num_emergency_plans\n  FROM\
      \ \"stg_emergency_plans\"\n  GROUP BY \"plan_for_hall\"\n)\nSELECT\n  e.\"Exhibition_Catalog_Code\"\
      ,\n  e.\"location_in_hall\",\n  COALESCE(p.total_coverage_value_usd, 0::NUMERIC)\
      \ AS total_coverage_value_usd,\n  COALESCE(p.num_policies, 0::INTEGER) AS num_policies,\n\
      \  COALESCE(pl.num_emergency_plans, 0::INTEGER) AS num_emergency_plans,\n  ROUND(\n\
      \    ((e.\"actual_cost\"::NUMERIC - e.\"BUDGET_USD\"::NUMERIC) / e.\"BUDGET_USD\"\
      ::NUMERIC * 100),\n    2\n  ) AS budget_variance_pct,\n  CASE\n    WHEN COALESCE(p.total_coverage_value_usd,\
      \ 0) = 0 AND e.\"actual_cost\" > e.\"BUDGET_USD\" THEN\n      ROUND(-((e.\"\
      actual_cost\"::NUMERIC - e.\"BUDGET_USD\"::NUMERIC) / e.\"BUDGET_USD\"::NUMERIC\
      \ * 100), 2)\n    WHEN COALESCE(p.total_coverage_value_usd, 0) = 0 THEN 0::NUMERIC\n\
      \    ELSE ROUND(\n        COALESCE(pl.num_emergency_plans, 0)::NUMERIC *\n \
      \       COALESCE(p.total_coverage_value_usd / NULLIF(p.num_policies::NUMERIC,\
      \ 0), 0::NUMERIC) /\n        e.\"BUDGET_USD\"::NUMERIC,\n        2\n      )\n\
      \  END AS risk_preparedness_score\nFROM \"stg_exhibitions\" e\nLEFT JOIN policy_agg\
      \ p ON p.\"policy_for_exhibition\" = e.\"Exhibition_Catalog_Code\"\nLEFT JOIN\
      \ plan_agg pl ON pl.\"plan_for_hall\" = e.\"location_in_hall\""
    target_model_id: int_exhibition_risk_profile
    target_view_name: int_exhibition_risk_profile
    verification_mode: breach_visible
