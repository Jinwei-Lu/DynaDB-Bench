  - atom_id: 83259afd479c
    event_log:
      after_state: null
      before_state: null
      description: "Exhibition curators at the museum have been allocating increasing\
        \ budgets to traveling and special exhibitions while deferring insurance coverage\
        \ renewals. Recently, three exhibitions\u2014EXH-2017-02 (Sounds of Antiquity:\
        \ Ritual Bells of the Bronze Age), EXH-2020-02 (Gold and Silver: Metalwork\
        \ of the Tang Dynasty), and EXH-2013-01 (The Five Great Wares: Masterpieces\
        \ of Song Ceramics)\u2014experienced budget overruns ranging from 5.5% to\
        \ 6.25%. While these exhibitions have active emergency response plans in their\
        \ respective halls, their insurance policies were allowed to lapse during\
        \ budget reallocation cycles. The museum's risk_preparedness_score treats\
        \ these uninsured high-exposure exhibitions identically to exhibitions with\
        \ no emergency plans at all, showing a score of 0 rather than flagging the\
        \ coverage gap. This creates a coverage illusion where the presence of emergency\
        \ protocols masks the absence of financial protection, leading risk management\
        \ dashboards to incorrectly conclude these exhibitions are adequately prepared."
      event_id: 725e6d8f49e0
      event_type: DISTRIBUTION_SHIFT
      target_object: int_exhibition_risk_profile
      timestamp: '2026-04-19T01:19:52.287549Z'
    event_log_info_level: medium
    event_sql: "INSERT INTO \"InsurancePolicies\" (\"Policy_Contract_Num\", \"POLICY_ID_CODE\"\
      , \"provider_name\", \"policy_type\", \"start_date\", \"end_date\", \"IS_ACTIVE\"\
      , \"policy_for_exhibition\", \"policy_updated_by\", \"policy_financials\")\n\
      VALUES \n  ('POL-BR-001', 'BR-2017-02', 'Museum Mutual', 'Exhibition', '2017-01-01',\
      \ '2018-12-31', true, 'EXH-2017-02', 2, '{\"deductible_usd\": 5000, \"annual_premium_usd\"\
      : 2500, \"total_coverage_value_usd\": 425000}'),\n  ('POL-BR-002', 'BR-2020-02',\
      \ 'Museum Mutual', 'Exhibition', '2020-01-01', '2021-12-31', true, 'EXH-2020-02',\
      \ 2, '{\"deductible_usd\": 5000, \"annual_premium_usd\": 2500, \"total_coverage_value_usd\"\
      : 475000}'),\n  ('POL-BR-003', 'BR-2013-01', 'Museum Mutual', 'Exhibition',\
      \ '2013-01-01', '2014-12-31', true, 'EXH-2013-01', 2, '{\"deductible_usd\":\
      \ 5000, \"annual_premium_usd\": 2500, \"total_coverage_value_usd\": 950000}');\n\
      DELETE FROM \"InsurancePolicies\" WHERE \"Policy_Contract_Num\" IN ('POL-BR-001',\
      \ 'POL-BR-002', 'POL-BR-003');"
    reference_is_original: false
    reference_model_sql: "CREATE OR REPLACE VIEW \"int_exhibition_risk_profile\" AS\n\
      WITH policy_agg AS (\n  SELECT\n    \"policy_for_exhibition\",\n    COUNT(*)::INTEGER\
      \ AS num_policies,\n    SUM(\"total_coverage_value_usd\") AS total_coverage_value_usd\n\
      \  FROM \"stg_insurance_policies\"\n  WHERE \"policy_for_exhibition\" IS NOT\
      \ NULL\n  GROUP BY \"policy_for_exhibition\"\n),\nplan_agg AS (\n  SELECT\n\
      \    \"plan_for_hall\",\n    COUNT(*)::INTEGER AS num_emergency_plans,\n   \
      \ MIN(ep.plan_version::NUMERIC) AS oldest_plan_version_numeric\n  FROM \"stg_emergency_plans\"\
      \ ep\n  GROUP BY \"plan_for_hall\"\n)\nSELECT\n  e.\"Exhibition_Catalog_Code\"\
      ,\n  e.\"location_in_hall\",\n  COALESCE(p.total_coverage_value_usd, 0::NUMERIC)\
      \ AS total_coverage_value_usd,\n  COALESCE(p.num_policies, 0::INTEGER) AS num_policies,\n\
      \  COALESCE(pl.num_emergency_plans, 0::INTEGER) AS num_emergency_plans,\n  ROUND(\n\
      \    ((e.\"actual_cost\"::NUMERIC - e.\"BUDGET_USD\"::NUMERIC) / e.\"BUDGET_USD\"\
      ::NUMERIC * 100),\n    2\n  ) AS budget_variance_pct,\n  ROUND(\n    CASE \n\
      \      WHEN COALESCE(p.num_policies, 0) = 0 AND COALESCE(pl.num_emergency_plans,\
      \ 0) > 0 THEN\n        (-1 * (1 + (e.\"actual_cost\"::NUMERIC - e.\"BUDGET_USD\"\
      ::NUMERIC) / NULLIF(e.\"BUDGET_USD\"::NUMERIC, 0) * 100))\n      ELSE\n    \
      \    COALESCE(pl.num_emergency_plans, 0)::NUMERIC *\n        COALESCE(p.total_coverage_value_usd\
      \ / NULLIF(p.num_policies::NUMERIC, 0), 0::NUMERIC) /\n        e.\"BUDGET_USD\"\
      ::NUMERIC\n    END,\n    2\n  ) AS risk_preparedness_score\nFROM \"stg_exhibitions\"\
      \ e\nLEFT JOIN policy_agg p ON p.\"policy_for_exhibition\" = e.\"Exhibition_Catalog_Code\"\
      \nLEFT JOIN plan_agg pl ON pl.\"plan_for_hall\" = e.\"location_in_hall\""
